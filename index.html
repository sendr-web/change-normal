<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 文档助手 - 格式转换与导出预览</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* 隐藏滚动条 */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* 补充 Tailwind-animate 缺失的基础动画关键帧 */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideInFromBottom2 {
      from { transform: translateY(0.5rem); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInFromBottom4 {
      from { transform: translateY(1rem); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInFromBottomFull {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    @keyframes slideInFromRight {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }
    /* 专门为 Toast 处理 X轴居中偏移的动画 */
    @keyframes slideInFromTop4Toast {
      from { transform: translate(-50%, -1rem); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }

    /* 映射类名 */
    .animate-in { animation-fill-mode: forwards; animation-timing-function: ease-out; }
    .fade-in { animation-name: fadeIn; }
    .slide-in-from-bottom-2 { animation-name: slideInFromBottom2; }
    .slide-in-from-bottom-4 { animation-name: slideInFromBottom4; }
    .slide-in-from-bottom-full { animation-name: slideInFromBottomFull; }
    .slide-in-from-right { animation-name: slideInFromRight; }
    .slide-in-from-top-4 { animation-name: slideInFromTop4Toast; }
    
    .duration-200 { animation-duration: 200ms; }
    .duration-300 { animation-duration: 300ms; }
    .duration-500 { animation-duration: 500ms; }
    .delay-150 { animation-delay: 150ms; }
    .fill-mode-both { animation-fill-mode: both; }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Sparkles, Network, Presentation, Share2, Maximize2, Download,
      FileText, Loader2, X, ChevronDown, LayoutGrid, PlusCircle,
      ChevronLeft, Check, MessageCircle, Send, DownloadCloud, Link2
    } from 'lucide-react';

    function App() {
      const [messages, setMessages] = useState([]);
      const [hasStartedChat, setHasStartedChat] = useState(false);
      
      // 弹窗状态管理
      const [showActionSheet, setShowActionSheet] = useState(false);
      const [showShareSheet, setShowShareSheet] = useState(false);
      
      // 页面流转状态管理
      const [viewMode, setViewMode] = useState('chat'); // 'chat' | 'preview'
      const [activePreviewMsg, setActivePreviewMsg] = useState(null);
      const [toastMsg, setToastMsg] = useState('');

      const messagesEndRef = useRef(null);

      // 滚动到底部
      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      useEffect(() => {
        if (viewMode === 'chat') {
          scrollToBottom();
        }
      }, [messages, viewMode]);

      const handleConvertClick = () => {
        setShowActionSheet(true);
      };

      const handleFormatSelect = (format) => {
        setShowActionSheet(false);
        setHasStartedChat(true);
        
        // 直接由 AI 响应
        const aiLoadingId = Date.now();
        setMessages(prev => [...prev, {
          id: aiLoadingId,
          sender: 'ai',
          status: 'loading',
          text: '正在为您抽取核心结构...'
        }]);

        // 模拟几秒后的结果返回
        setTimeout(() => {
          setMessages(prev => prev.map(msg => 
            msg.id === aiLoadingId 
              ? {
                  ...msg,
                  status: 'success',
                  text: '转换完成！这是为您生成的预览：',
                  cardType: format.type,
                  cardTitle: `当前文档 - ${format.name}`,
                  cardFormatName: format.name
                }
              : msg
          ));
        }, 2500); 
      };

      // 点击进入预览编辑模式
      const handlePreview = (msg) => {
        setActivePreviewMsg(msg);
        setViewMode('preview');
      };

      // 退出预览编辑模式
      const handleClosePreview = () => {
        setViewMode('chat');
        // 延迟清空状态以保证退场动画连贯
        setTimeout(() => setActivePreviewMsg(null), 300);
      };

      // 点击触发原生分享面板
      const handleExport = () => {
        setShowShareSheet(true);
      };

      // 执行具体分享操作并展示 Toast
      const executeShareAction = (actionName) => {
        setShowShareSheet(false);
        // 触发全局 Toast
        setToastMsg(`已成功${actionName}`);
        setTimeout(() => setToastMsg(''), 2500);
      };

      const formatOptions = [
        { id: 'mindmap', name: '思维导图', type: 'mindmap', icon: <Network className="w-5 h-5 text-blue-500" />, desc: '梳理逻辑层级与分支关系' },
        { id: 'ppt', name: '演示文稿 (PPT)', type: 'ppt', icon: <Presentation className="w-5 h-5 text-[#f97316]" />, desc: '生成幻灯片大纲与排版' },
        { id: 'flowchart', name: '流程图', type: 'flowchart', icon: <Share2 className="w-5 h-5 text-[#22c55e]" />, desc: '展示步骤与流转过程' },
      ];

      return (
        <div className="flex justify-center bg-gray-100 min-h-screen font-sans items-center">
          {/* 模拟手机/窄屏容器 - 深色背景以突显白色浮层 */}
          <div className="w-full max-w-md bg-[#1C1C1E] relative flex flex-col h-screen sm:h-[800px] sm:rounded-[40px] overflow-hidden shadow-2xl sm:border-[6px] border-black ring-1 ring-gray-800">
            
            {/* iOS 状态栏模拟 */}
            <div className="flex justify-between items-center px-7 pt-4 pb-2 text-white text-[14px] font-semibold shrink-0 z-50">
              <span>9:41</span>
              <div className="flex space-x-1.5 items-center">
                <div className="w-4 h-3.5 flex items-end space-x-[2px]"><div className="w-1 h-1.5 bg-white rounded-sm"></div><div className="w-1 h-2.5 bg-white rounded-sm"></div><div className="w-1 h-3.5 bg-white rounded-sm"></div></div>
                <div className="w-6 h-3 border border-white/40 bg-white/20 rounded-[4px] p-[1px] relative"><div className="w-[80%] h-full bg-white rounded-[2px]"></div><div className="absolute -right-1 top-1 w-0.5 h-1 bg-white/40 rounded-r-sm"></div></div>
              </div>
            </div>

            {/* --- 主会话页 (Chat) --- */}
            <div className="flex-1 bg-white rounded-t-[32px] mt-2 flex flex-col overflow-hidden relative shadow-[0_-8px_30px_rgba(0,0,0,0.12)]">
              
              {/* Toast 提示 */}
              {toastMsg && (
                <div className="absolute top-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-5 py-2.5 rounded-full shadow-lg z-50 flex items-center text-[14px] font-medium animate-in fade-in slide-in-from-top-4 duration-300">
                  <Check className="w-4 h-4 mr-2 text-[#4ade80]" />
                  {toastMsg}
                </div>
              )}

              {/* 顶部导航栏 */}
              <div className="flex items-center justify-center px-4 py-5 bg-white z-10 sticky top-0 relative">
                <div className="flex items-center space-x-1 cursor-pointer">
                  <h1 className="text-[17px] font-semibold text-gray-900">AI文档助手</h1>
                  <ChevronDown className="w-5 h-5 text-gray-900" />
                </div>
              </div>

              {/* 内容区: 欢迎页 or 聊天流 */}
              <div className="flex-1 overflow-y-auto p-5 bg-white scrollbar-hide">
                {!hasStartedChat ? (
                  <div className="mt-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <h2 className="text-[28px] font-bold text-gray-900 mb-2 tracking-tight">Hi, 有什么可以帮你？</h2>
                    <p className="text-gray-500 text-[14px] mb-8">你似乎在浏览一份入学信息统计表，我可以帮你</p>
                    
                    <div className="space-y-3">
                      <button className="w-full text-left px-5 py-4 bg-[#F5F6F8] hover:bg-gray-100 rounded-2xl text-[15px] text-gray-800 transition-colors">根据表格内容提供3个关键洞察</button>
                      <button className="w-full text-left px-5 py-4 bg-[#F5F6F8] hover:bg-gray-100 rounded-2xl text-[15px] text-gray-800 transition-colors">优化表头高度和字体样式</button>
                      <button className="w-full text-left px-5 py-4 bg-[#F5F6F8] hover:bg-gray-100 rounded-2xl text-[15px] text-gray-800 transition-colors">加粗所有带人名的单元格</button>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-6 pb-4">
                    {messages.map((msg) => (
                      <div key={msg.id} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                        {msg.sender === 'ai' && (
                          <div className="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white shrink-0 mr-3 mt-1 shadow-sm">
                            <Sparkles className="w-4 h-4" />
                          </div>
                        )}

                        <div className={`max-w-[80%] ${msg.sender === 'user' ? 'items-end' : 'items-start'} flex flex-col`}>
                          {(msg.text || msg.status === 'loading') && (
                            <div 
                              className={`relative px-4 py-3 text-[15px] leading-relaxed shadow-sm
                                ${msg.sender === 'user' 
                                  ? 'bg-blue-600 text-white rounded-2xl rounded-tr-sm' 
                                  : 'bg-white text-gray-800 border border-gray-100 rounded-2xl rounded-tl-sm whitespace-pre-wrap'
                                }
                              `}
                            >
                              {msg.status === 'loading' ? (
                                <div className="flex items-center text-gray-500">
                                  <Loader2 className="w-4 h-4 mr-2 animate-spin text-blue-500" />
                                  {msg.text}
                                </div>
                              ) : (
                                msg.text
                              )}
                            </div>
                          )}

                          {/* 结果卡片 */}
                          {msg.cardType && (
                            <div className="mt-3 w-full w-[280px] sm:w-[320px] bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-sm animate-in fade-in slide-in-from-bottom-2">
                              <div className="px-4 py-3 flex items-center border-b border-gray-100 bg-gray-50/50">
                                {msg.cardType === 'mindmap' ? <Network className="w-4 h-4 text-blue-500 mr-2" /> : <Presentation className="w-4 h-4 text-orange-500 mr-2" />}
                                <span className="text-sm font-medium text-gray-700 truncate">{msg.cardTitle}</span>
                              </div>
                              
                              {/* 缩略图区域 */}
                              <div className="h-36 bg-gray-100 relative overflow-hidden flex items-center justify-center p-4">
                                {msg.cardType === 'mindmap' && (
                                  <div className="w-full h-full border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center bg-white/50 backdrop-blur-sm cursor-pointer hover:bg-white transition-colors" onClick={() => handlePreview(msg)}>
                                    <div className="flex items-center scale-90">
                                        <div className="w-16 h-8 bg-blue-100 border border-blue-300 rounded-md flex items-center justify-center text-[10px] text-blue-700 font-medium">核心结构</div>
                                        <div className="w-8 h-0.5 bg-gray-300"></div>
                                        <div className="flex flex-col space-y-2">
                                          <div className="flex items-center"><div className="w-4 h-0.5 bg-gray-300"></div><div className="w-12 h-6 bg-white border border-gray-200 rounded text-[8px] flex items-center justify-center text-gray-600">模块一</div></div>
                                          <div className="flex items-center"><div className="w-4 h-0.5 bg-gray-300"></div><div className="w-12 h-6 bg-white border border-gray-200 rounded text-[8px] flex items-center justify-center text-gray-600">模块二</div></div>
                                          <div className="flex items-center"><div className="w-4 h-0.5 bg-gray-300"></div><div className="w-12 h-6 bg-white border border-gray-200 rounded text-[8px] flex items-center justify-center text-gray-600">模块三</div></div>
                                        </div>
                                    </div>
                                  </div>
                                )}
                                {msg.cardType === 'ppt' && (
                                  <div className="w-full h-full flex space-x-2 items-center justify-center cursor-pointer hover:opacity-90 transition-opacity" onClick={() => handlePreview(msg)}>
                                    <div className="w-24 h-16 bg-white border border-gray-300 shadow-sm rounded-sm p-1 flex flex-col justify-between transform -rotate-2">
                                      <div className="w-full h-2 bg-blue-500/20 rounded-sm mb-1"></div>
                                      <div className="w-2/3 h-1 bg-gray-200 rounded-sm mb-0.5"></div>
                                      <div className="w-1/2 h-1 bg-gray-200 rounded-sm"></div>
                                    </div>
                                    <div className="w-24 h-16 bg-white border border-gray-300 shadow-sm rounded-sm p-1 flex flex-col z-10 scale-110">
                                      <div className="w-3/4 h-2 bg-blue-600 rounded-sm mx-auto mt-2 mb-2"></div>
                                      <div className="w-full flex space-x-1 px-1">
                                          <div className="w-1/2 h-6 bg-gray-100 rounded-sm"></div>
                                          <div className="w-1/2 h-6 bg-gray-100 rounded-sm"></div>
                                        </div>
                                    </div>
                                    <div className="w-24 h-16 bg-white border border-gray-300 shadow-sm rounded-sm p-1 flex flex-col justify-between transform rotate-2">
                                      <div className="w-full h-2 bg-blue-500/20 rounded-sm mb-1"></div>
                                      <div className="w-full h-1 bg-gray-200 rounded-sm mb-0.5"></div>
                                      <div className="w-2/3 h-1 bg-gray-200 rounded-sm"></div>
                                    </div>
                                  </div>
                                )}
                              </div>

                              {/* 核心按钮区 */}
                              <div className="grid grid-cols-2 divide-x divide-gray-100 bg-white">
                                <button 
                                  onClick={() => handlePreview(msg)}
                                  className="flex items-center justify-center py-3.5 text-[14px] font-medium text-gray-700 hover:bg-gray-50 active:bg-gray-100 transition-colors"
                                >
                                  <Maximize2 className="w-4 h-4 mr-1.5 text-gray-500" />
                                  预览 / 编辑
                                </button>
                                <button 
                                  onClick={handleExport}
                                  className="flex items-center justify-center py-3.5 text-[14px] font-medium text-blue-600 hover:bg-blue-50 active:bg-blue-100 transition-colors"
                                >
                                  <Download className="w-4 h-4 mr-1.5" />
                                  导出文件
                                </button>
                              </div>
                            </div>
                          )}

                        </div>
                      </div>
                    ))}
                    <div ref={messagesEndRef} />
                  </div>
                )}
              </div>

              {/* 底部操作与输入区 */}
              <div className="bg-white px-4 pb-8 pt-2 z-10 shrink-0 flex flex-col">
                <div className="flex items-center space-x-3 mb-4 overflow-x-auto scrollbar-hide">
                  <button 
                    onClick={handleConvertClick}
                    className="flex items-center bg-white border border-gray-200 shadow-sm text-gray-700 text-[14px] px-4 py-2 rounded-[20px] hover:bg-gray-50 transition-all active:scale-95 whitespace-nowrap"
                  >
                    <Sparkles className="w-[16px] h-[16px] mr-1.5 text-gray-700" />
                    格式转化
                  </button>
                  <button className="flex items-center bg-white border border-gray-200 shadow-sm text-gray-700 text-[14px] px-4 py-2 rounded-[20px] hover:bg-gray-50 transition-all active:scale-95 whitespace-nowrap">
                    <FileText className="w-[16px] h-[16px] mr-1.5 text-gray-700" />
                    功能B
                  </button>
                </div>

                <div className="bg-white rounded-[28px] h-[52px] px-2 flex items-center justify-between border border-gray-200 shadow-sm">
                  <button className="w-10 h-10 flex items-center justify-center text-gray-800 hover:bg-gray-100 rounded-full transition-colors">
                    <LayoutGrid className="w-[22px] h-[22px]" />
                  </button>
                  <div className="flex-1 text-center text-gray-900 font-medium text-[15px]">按住 说话</div>
                  <button className="w-10 h-10 flex items-center justify-center text-gray-800 hover:bg-gray-100 rounded-full transition-colors">
                    <PlusCircle className="w-[22px] h-[22px]" />
                  </button>
                </div>
              </div>
            </div>

            {/* ========================================================= */}
            {/* --- 沉浸式预览/编辑页 (Overlay) --- */}
            {viewMode === 'preview' && activePreviewMsg && (
              <div className="absolute inset-0 bg-white z-[60] flex flex-col animate-in slide-in-from-right duration-300">
                {/* 顶栏 */}
                <div className="flex items-center justify-between px-4 pt-12 pb-3 bg-white border-b border-gray-100 shrink-0">
                  <button onClick={handleClosePreview} className="p-1 -ml-1 flex items-center text-gray-700 hover:bg-gray-100 rounded-lg">
                    <ChevronLeft className="w-6 h-6" />
                    <span className="text-[15px]">返回</span>
                  </button>
                  <div className="font-semibold text-[16px] text-gray-900">{activePreviewMsg.cardFormatName}编辑</div>
                  <button 
                    onClick={() => {
                      setToastMsg('大纲已保存');
                      setTimeout(() => setToastMsg(''), 2000);
                      handleClosePreview();
                    }} 
                    className="text-[15px] font-medium text-blue-600 px-3 py-1.5 hover:bg-blue-50 rounded-lg"
                  >
                    保存
                  </button>
                </div>
                
                {/* 解耦编辑区（大纲视图 Mock） */}
                <div className="flex-1 overflow-y-auto bg-gray-50 p-4 custom-scrollbar">
                  <div className="mb-4 flex items-center px-2">
                    <div className="w-1 h-4 bg-blue-500 rounded-full mr-2"></div>
                    <span className="text-[13px] text-gray-500 font-medium">修改以下大纲不会影响您的原文档</span>
                  </div>
                  <textarea 
                    className="w-full min-h-[500px] p-5 rounded-2xl border border-gray-200 bg-white shadow-sm outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-300 text-[15px] leading-relaxed text-gray-800 resize-none font-sans"
                    defaultValue={`# 第一部分：核心要素解析\n- 多模态模型的突破与应用\n- 端侧计算带来的隐私与效率革命\n\n# 第二部分：行业落地场景\n- 医疗领域的专业辅诊助手\n- 金融风控的实时研判系统\n\n# 第三部分：未来展望\n- 超级个体的诞生\n- 算力成本的规模化下降`}
                  />
                </div>
              </div>
            )}

            {/* ========================================================= */}
            {/* --- 格式转化面板 (Action Sheet) --- */}
            {showActionSheet && (
              <>
                <div className="absolute inset-0 bg-black/40 z-[70] animate-in fade-in duration-200" onClick={() => setShowActionSheet(false)} />
                <div className="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] z-[70] animate-in slide-in-from-bottom-full duration-300 ease-out">
                  <div className="p-5 pb-8">
                    <div className="flex items-center justify-between mb-5 px-1">
                      <h3 className="text-[18px] font-bold text-[#1f2329]">将文本转换为...</h3>
                      <button onClick={() => setShowActionSheet(false)} className="p-1.5 text-gray-400 hover:bg-gray-100 rounded-full transition-colors"><X className="w-5 h-5" /></button>
                    </div>
                    <div className="space-y-3">
                      {formatOptions.map((format, index) => (
                        <button
                          key={format.id}
                          onClick={() => handleFormatSelect(format)}
                          className={`w-full flex items-center p-4 rounded-[20px] transition-all text-left group ${index === 0 ? 'border border-[#B2CCFF] bg-[#F4F8FF] hover:bg-blue-50' : 'border border-gray-100 bg-white hover:bg-gray-50 shadow-[0_2px_8px_rgba(0,0,0,0.02)]'}`}
                        >
                          <div className={`w-[42px] h-[42px] bg-white rounded-xl shadow-sm flex items-center justify-center shrink-0 mr-4 group-hover:scale-105 transition-transform ${index !== 0 && 'border border-gray-50'}`}>
                            {format.icon}
                          </div>
                          <div>
                            <div className="font-bold text-[#1f2329] text-[16px] mb-0.5">{format.name}</div>
                            <div className="text-[13px] text-gray-500">{format.desc}</div>
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </>
            )}

            {/* ========================================================= */}
            {/* --- 原生分享面板 Mock (Share Sheet) --- */}
            {showShareSheet && (
              <>
                <div className="absolute inset-0 bg-black/40 z-[70] animate-in fade-in duration-200" onClick={() => setShowShareSheet(false)} />
                <div className="absolute bottom-0 left-0 right-0 bg-[#F2F2F7] rounded-t-3xl shadow-2xl z-[70] animate-in slide-in-from-bottom-full duration-300 ease-out">
                  <div className="p-4 pb-8">
                    {/* 顶部把手 */}
                    <div className="w-10 h-1.5 bg-gray-300 rounded-full mx-auto mb-6"></div>
                    
                    {/* 应用分享栏 */}
                    <div className="bg-white rounded-2xl mb-4 overflow-hidden">
                      <div className="flex items-center px-4 py-4 overflow-x-auto space-x-6 scrollbar-hide">
                        {/* 微信 */}
                        <button onClick={() => executeShareAction('分享到微信')} className="flex flex-col items-center justify-center w-14 group">
                          <div className="w-[50px] h-[50px] bg-[#07C160] rounded-2xl flex items-center justify-center text-white mb-1.5 group-hover:opacity-90 active:scale-95 transition-all">
                            <MessageCircle className="w-7 h-7" />
                          </div>
                          <span className="text-[11px] text-gray-600 font-medium">微信</span>
                        </button>
                        {/* 飞书 */}
                        <button onClick={() => executeShareAction('分享到飞书')} className="flex flex-col items-center justify-center w-14 group">
                          <div className="w-[50px] h-[50px] bg-[#3370FF] rounded-2xl flex items-center justify-center text-white mb-1.5 group-hover:opacity-90 active:scale-95 transition-all">
                            <Send className="w-6 h-6 -ml-1 mt-1 transform -rotate-12" />
                          </div>
                          <span className="text-[11px] text-gray-600 font-medium">飞书</span>
                        </button>
                        {/* 复制链接 */}
                        <button onClick={() => executeShareAction('复制分享链接')} className="flex flex-col items-center justify-center w-14 group">
                          <div className="w-[50px] h-[50px] bg-gray-100 border border-gray-200 rounded-2xl flex items-center justify-center text-gray-700 mb-1.5 group-hover:bg-gray-200 active:scale-95 transition-all">
                            <Link2 className="w-6 h-6" />
                          </div>
                          <span className="text-[11px] text-gray-600 font-medium">复制链接</span>
                        </button>
                      </div>
                    </div>

                    {/* 文件操作栏 */}
                    <div className="bg-white rounded-2xl overflow-hidden divide-y divide-gray-100">
                      <button onClick={() => executeShareAction('保存为 PDF')} className="w-full flex items-center justify-between px-4 py-3.5 hover:bg-gray-50 active:bg-gray-100 transition-colors">
                        <span className="text-[16px] text-gray-800">保存为 PDF 文档</span>
                        <DownloadCloud className="w-5 h-5 text-gray-400" />
                      </button>
                      <button onClick={() => executeShareAction('保存到系统相册')} className="w-full flex items-center justify-between px-4 py-3.5 hover:bg-gray-50 active:bg-gray-100 transition-colors">
                        <span className="text-[16px] text-gray-800">保存为长图 (PNG)</span>
                        <DownloadCloud className="w-5 h-5 text-gray-400" />
                      </button>
                      <button onClick={() => executeShareAction('导出原始大纲')} className="w-full flex items-center justify-between px-4 py-3.5 hover:bg-gray-50 active:bg-gray-100 transition-colors">
                        <span className="text-[16px] text-gray-800">导出原始大纲文本</span>
                        <FileText className="w-5 h-5 text-gray-400" />
                      </button>
                    </div>

                    {/* 取消按钮 */}
                    <button 
                      onClick={() => setShowShareSheet(false)}
                      className="w-full mt-4 bg-white rounded-2xl py-3.5 text-[16px] font-medium text-blue-600 active:bg-gray-50 transition-colors"
                    >
                      取消
                    </button>
                  </div>
                </div>
              </>
            )}

            {/* iOS Home Indicator */}
            <div className="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/20 rounded-full z-50 pointer-events-none hidden sm:block"></div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
